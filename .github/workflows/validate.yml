name: validate

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Weekly: catches upstream publication drift even with no code changes.
    - cron: "0 6 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mcp

      - name: Rebuild normalized data from sources
        run: python ingestion/ingest_all.py

      - name: Validate dataset (integrity + source drift)
        run: python validation/validate.py
